name: E2E Smoke Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  e2e:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        options: >-
          --health-cmd mongosh
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Check secret presence (masked)
        run: |
          [ -n "${AUTH_GITHUB_ID}" ] && echo "AUTH_GITHUB_ID is set" || echo "AUTH_GITHUB_ID is MISSING"
          [ -n "${AUTH_GITHUB_SECRET}" ] && echo "AUTH_GITHUB_SECRET is set" || echo "AUTH_GITHUB_SECRET is MISSING"
        env:
          AUTH_GITHUB_ID: ${{ secrets.AUTH_GITHUB_ID }}
          AUTH_GITHUB_SECRET: ${{ secrets.AUTH_GITHUB_SECRET }}

      - name: Build app
        run: npm run build
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_GITHUB_ID: ${{ secrets.AUTH_GITHUB_ID }}
          AUTH_GITHUB_SECRET: ${{ secrets.AUTH_GITHUB_SECRET }}
          MONGODB_URL: mongodb://localhost:27017/test
          E2E_TEST_MODE: "true"
          NEXT_PUBLIC_E2E_TEST_MODE: "true"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_GITHUB_ID: ${{ secrets.AUTH_GITHUB_ID }}
          AUTH_GITHUB_SECRET: ${{ secrets.AUTH_GITHUB_SECRET }}
          MONGODB_URL: mongodb://localhost:27017/test
          E2E_TEST_MODE: "true"
          NEXT_PUBLIC_E2E_TEST_MODE: "true"
          E2E_TEST_USER_ID: smoke-user-1
          CI: true
        run: npm run test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
